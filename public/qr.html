<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Menú · Pedir</title>
<style>
  :root{--accent:#E8A33D;--accent-ink:#8a5a12;--ink:#211a12;--bg:#fbf6ee;--card:#fff;--line:#ece3d5;--muted:#8a7f70;--green:#1f9d57;--red:#d4503b}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:120px}
  header{background:var(--ink);color:#fff;padding:18px 16px;text-align:center;position:sticky;top:0;z-index:5}
  header img{max-height:54px;max-width:160px;display:block;margin:0 auto 6px}
  header .nm{font-size:20px;font-weight:800}
  header .suc{font-size:13px;opacity:.8}
  .cats{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;position:sticky;top:0;background:var(--bg);scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{white-space:nowrap;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 15px;font-weight:600;font-size:14px;cursor:pointer}
  .cat.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .list{padding:0 14px}
  h2{font-size:16px;margin:18px 4px 8px}
  .prod{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .prod .nm{font-weight:600}
  .prod .pr{color:var(--accent-ink);font-weight:700;font-size:14px;margin-top:2px}
  .add{background:var(--accent);color:#3a2606;border:none;border-radius:10px;width:38px;height:38px;font-size:22px;font-weight:700;cursor:pointer;flex:none}
  .qty{display:flex;align-items:center;gap:10px}
  .qty button{background:var(--ink);color:#fff;border:none;border-radius:8px;width:32px;height:32px;font-size:18px;font-weight:700;cursor:pointer}
  .qty span{font-weight:700;min-width:20px;text-align:center}
  .cartbar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:14px 16px;box-shadow:0 -6px 20px rgba(0,0,0,.08)}
  .cartbar .tot{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:700}
  .cartbar button.go{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer}
  .cartbar button.go:disabled{background:#cdcdcd}
  .field{margin-bottom:10px}.field input{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:20}
  .ov.show{display:flex}
  .sheet{background:var(--card);width:100%;border-radius:18px 18px 0 0;padding:18px 16px;max-height:85vh;overflow:auto}
  .sheet h3{margin:0 0 12px}
  .crow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
  .msg{text-align:center;padding:30px 16px}
  .msg .big{font-size:42px}.msg h3{font-size:22px;margin:8px 0}
  .muted{color:var(--muted);font-size:13px}
  .empty{color:var(--muted);text-align:center;padding:24px}
</style>
</head>
<body>
<header id="head"></header>
<div class="cats" id="cats"></div>
<div class="list" id="list"></div>

<div class="cartbar" id="cartbar" style="display:none">
  <div class="tot"><span id="ctCount">0 productos</span><span id="ctTotal">$0.00</span></div>
  <button class="go" id="verCarrito">Ver pedido y enviar</button>
</div>

<div class="ov" id="ov">
  <div class="sheet" id="sheet"></div>
</div>

<script>
const PARTS=location.pathname.split('/').filter(Boolean); // ['qr', row, suc]
const ROW=PARTS[1], SUC=PARTS[2];
const money=n=>'$'+(+(n||0)).toFixed(2);
let MENU=null, cart={}; // productoId -> {prod, qty}
const $=s=>document.querySelector(s);

async function load(){
  try{
    const r=await fetch(`/qr/${ROW}/${SUC}/menu`);
    if(!r.ok){document.body.innerHTML='<div class="msg"><div class="big">😕</div><h3>Menú no disponible</h3><div class="muted">Pide al personal el enlace o QR correcto.</div></div>';return;}
    MENU=await r.json();
    $('#head').innerHTML=(MENU.tenant.logo?`<img src="${MENU.tenant.logo}" alt="">`:'')+`<div class="nm">${MENU.tenant.nombre}</div><div class="suc">${MENU.sucursal.nombre} · Pedir desde tu mesa</div>`;
    MENU.cat0=MENU.categorias[0]?MENU.categorias[0].id:null;
    render();
  }catch(e){document.body.innerHTML='<div class="msg"><div class="big">📶</div><h3>Sin conexión</h3></div>';}
}
function prodsDe(cid){return MENU.productos.filter(p=>p.categoriaId===cid);}
function render(){
  $('#cats').innerHTML=MENU.categorias.map(c=>`<button class="cat ${c.id===MENU.cat0?'active':''}" data-c="${c.id}">${c.nombre}</button>`).join('');
  const ps=prodsDe(MENU.cat0);
  $('#list').innerHTML=ps.length?ps.map(p=>{const q=cart[p.id]?cart[p.id].qty:0;
    return `<div class="prod"><div><div class="nm">${p.nombre}</div>${p.descripcion?`<div class="muted" style="margin:2px 0 3px;max-width:230px">${p.descripcion}</div>`:''}<div class="pr">${money(p.precioBase)}${p.conOpciones?'+':''}</div></div>
      ${q>0?`<div class="qty"><button data-dec="${p.id}">−</button><span>${q}</span><button data-inc="${p.id}">+</button></div>`:`<button class="add" data-inc="${p.id}">+</button>`}</div>`;}).join(''):'<div class="empty">Sin productos en esta categoría.</div>';
  document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{MENU.cat0=b.dataset.c;render();});
  document.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>chg(b.dataset.inc,1));
  document.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>chg(b.dataset.dec,-1));
  pintarCarrito();
}
function chg(id,d){
  const p=MENU.productos.find(x=>x.id===id);if(!p)return;
  const q=(cart[id]?cart[id].qty:0)+d;
  if(q<=0)delete cart[id];else cart[id]={prod:p,qty:Math.min(20,q)};
  render();
}
function items(){return Object.values(cart);}
function total(){return items().reduce((s,c)=>s+c.prod.precioBase*c.qty,0);}
function pintarCarrito(){
  const n=items().reduce((s,c)=>s+c.qty,0);
  $('#cartbar').style.display=n>0?'':'none';
  $('#ctCount').textContent=n+' producto'+(n!==1?'s':'');
  $('#ctTotal').textContent=money(total());
}
$('#verCarrito').onclick=()=>{
  $('#sheet').innerHTML=`<h3>Tu pedido</h3>
    ${items().map(c=>`<div class="crow"><span>${c.qty}× ${c.prod.nombre}</span><span>${money(c.prod.precioBase*c.qty)}</span></div>`).join('')}
    <div class="crow" style="font-weight:800;border:none"><span>Total</span><span>${money(total())}</span></div>
    <div class="field" style="margin-top:14px"><input id="qNombre" placeholder="Tu nombre (opcional)"></div>
    <div class="field"><input id="qMesa" placeholder="Número de mesa (opcional)"></div>
    <button class="go" id="enviar" style="width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700">Enviar pedido</button>
    <button style="width:100%;background:none;border:none;color:var(--muted);padding:12px;margin-top:4px" id="seguir">Seguir pidiendo</button>
    <div class="muted" style="text-align:center;margin-top:6px">El pago se realiza en caja.</div>`;
  $('#ov').classList.add('show');
  $('#seguir').onclick=()=>$('#ov').classList.remove('show');
  $('#enviar').onclick=enviar;
};
async function enviar(){
  const btn=$('#enviar');btn.disabled=true;btn.textContent='Enviando…';
  try{
    const body={items:items().map(c=>({productoId:c.prod.id,cantidad:c.qty})),cliente:{nombre:$('#qNombre').value,mesa:$('#qMesa').value}};
    const r=await fetch(`/qr/${ROW}/${SUC}/pedido`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await r.json();
    if(!r.ok)throw new Error(data.error||'Error');
    cart={};
    document.body.innerHTML=`<div class="msg"><div class="big">✅</div><h3>¡Pedido enviado!</h3>
      <div class="muted">Folio <b>${data.folio}</b>${data.mesa?` · Mesa ${data.mesa}`:''}</div>
      <p style="margin-top:14px">Pasa a <b>caja</b> para confirmar y pagar tu pedido por <b>${money(data.total)}</b>.</p>
      <button class="go" style="margin-top:10px;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:13px 22px;font-weight:700" onclick="location.reload()">Hacer otro pedido</button></div>`;
  }catch(e){btn.disabled=false;btn.textContent='Enviar pedido';alert(e.message||'No se pudo enviar');}
}
load();
</script>
</body>
</html>
