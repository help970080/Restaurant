<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jefe Burgers — Consola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17150f;--ink2:#221f17;--paper:#f4f1ea;--card:#fff;--line:#e5dfd2;
    --accent:#e0841a;--accent-ink:#7a4708;--accent-bg:#fbeed8;
    --green:#2f8f4e;--green-bg:#e7f3ea;--red:#c8472f;--red-bg:#fbe9e4;
    --blue:#3b6ea5;--blue-bg:#e7eef6;--muted:#8c857a;--mono:'Spline Sans Mono',monospace;
  }
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);font-size:15px;height:100vh;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  #app{height:100%}

  /* LOGIN */
  .login{height:100%;display:flex;align-items:center;justify-content:center;background:var(--ink)}
  .login-card{background:var(--card);border-radius:20px;padding:34px 30px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-card .logo{font-family:'Bricolage Grotesque';font-weight:700;font-size:30px;text-align:center;margin-bottom:4px}
  .login-card .logo b{color:var(--accent)}
  .login-card .tg{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
  .login-card label{display:block;font-weight:600;font-size:13px;margin:12px 0 5px}
  .login-card input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px}
  .login-card button{width:100%;padding:13px;background:var(--accent);color:#2c1c04;font-weight:700;font-size:16px;margin-top:20px}
  .login-card .err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}

  /* SHELL */
  .shell{display:flex;height:100%}
  .sidebar{width:218px;background:var(--ink);color:#e8e3d8;display:flex;flex-direction:column;flex:0 0 auto}
  .logo{font-family:'Bricolage Grotesque';font-weight:700;font-size:21px;letter-spacing:-.02em;padding:18px 20px 14px}
  .logo b{color:var(--accent)}
  .brandlogo{max-height:40px;max-width:172px;display:block;object-fit:contain}
  .brandtext{font-family:'Bricolage Grotesque';font-weight:700;font-size:20px;line-height:1.1;display:block}
  .cols2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cols2-wide{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  @media(max-width:900px){.cols2-wide{grid-template-columns:1fr}}
  .checagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .checacard{text-align:left;padding:16px;border-radius:14px;border:1px solid var(--line);background:var(--card);display:flex;flex-direction:column;gap:3px;transition:transform .08s}
  .checacard:active{transform:scale(.97)}
  .checacard.on{border-color:var(--green);background:#eef7f0}
  .checacard .cknom{font-family:'Bricolage Grotesque';font-weight:700;font-size:17px}
  .checacard .ckpue{font-size:12px;color:var(--muted)}
  .checacard .ckstat{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:5px}
  .checacard.on .ckstat{color:var(--green);font-weight:600}
  .checacard .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
  .checacard .ckact{margin-top:8px;font-size:13px;font-weight:600;color:var(--accent-ink)}
  .checacard.on .ckact{color:var(--green)}
  .nav{flex:1;padding:6px 10px;overflow-y:auto}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;color:#b7b0a2;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;margin-bottom:2px}
  .nav button:hover{background:#272318;color:#e8e3d8}
  .nav button.active{background:var(--accent);color:#2c1c04;font-weight:600}
  .nav svg{width:18px;height:18px;flex:0 0 auto}
  .nav .badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-family:var(--mono);padding:1px 7px;border-radius:999px;font-weight:600}
  .nav button.active .badge{background:#2c1c04;color:var(--accent)}
  .side-foot{padding:12px 16px;border-top:1px solid #2a261b;font-size:12px;color:#8c857a;display:flex;justify-content:space-between;align-items:center}
  .side-foot button{background:none;color:#b7b0a2;font-size:12px;padding:4px 8px}
  .side-foot button:hover{color:#e8e3d8}

  .app-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:13px;padding:12px 22px;background:var(--card);border-bottom:1px solid var(--line);flex:0 0 auto}
  .vtitle{font-family:'Bricolage Grotesque';font-weight:700;font-size:22px}
  .spacer{flex:1}
  select.suc{padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-weight:600;font-size:14px;background:var(--card)}
  .turno-pill{font-size:13px;padding:7px 13px;border-radius:999px;font-weight:600;font-family:var(--mono)}
  .turno-pill.off{background:var(--paper);color:var(--muted)}
  .turno-pill.on{background:var(--green-bg);color:var(--green)}
  .btn{padding:9px 15px;font-weight:600;font-size:14px;background:var(--paper);color:var(--ink);border:1px solid var(--line)}
  .btn:hover{background:#ece7dc}
  .btn.accent{background:var(--accent);color:#2c1c04;border-color:var(--accent)}
  .btn.dark{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .view{flex:1;overflow-y:auto;padding:22px;min-height:0}
  .loading{color:var(--muted);text-align:center;padding:60px}

  /* CARDS / GRID */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .kpi .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .kpi .val{font-family:var(--mono);font-size:28px;font-weight:600;margin-top:6px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .kpi.accent{background:var(--accent-bg);border-color:#eccfa0}.kpi.accent .val{color:var(--accent-ink)}
  .cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:1000px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .panel h3{font-family:'Bricolage Grotesque';font-size:17px;margin:0 0 14px}
  .panel h3 .small{font-family:'Inter';font-size:12px;color:var(--muted);font-weight:400;margin-left:8px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 8px;font-size:14px;border-bottom:1px solid var(--line)}
  th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  td.num,th.num{text-align:right;font-family:var(--mono)}tr:last-child td{border-bottom:none}
  .thumb{display:inline-block;width:50px;height:38px;border-radius:8px;overflow:hidden;vertical-align:middle;margin-right:10px;border:1px solid var(--line)}
  .thumb .art{width:50px;height:38px;display:block}
  .chip{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .chip.cocina{background:var(--accent-bg);color:var(--accent-ink)}.chip.barra{background:var(--blue-bg);color:var(--blue)}
  .chip.ok{background:var(--green-bg);color:var(--green)}.chip.low{background:var(--red-bg);color:var(--red)}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .bar-row .bn{font-size:13px;width:140px;flex:0 0 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-row .bt{flex:1;height:22px;background:var(--paper);border-radius:6px;overflow:hidden}
  .bar-row .bf{height:100%;background:var(--accent);border-radius:6px}
  .bar-row .bv{font-family:var(--mono);font-size:13px;width:70px;text-align:right;flex:0 0 auto}

  /* POS */
  .pos{display:grid;grid-template-columns:1fr 360px;gap:16px;height:100%}
  @media(max-width:900px){.pos{grid-template-columns:1fr}}
  .pos-menu{overflow-y:auto}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .cat{background:var(--card);border:1px solid var(--line);padding:10px 17px;border-radius:999px;font-weight:600;font-size:15px;color:var(--muted)}
  .cat.active{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:16px}
  .prod{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;text-align:left;display:flex;flex-direction:column;transition:transform .08s,box-shadow .12s;padding:0}
  .prod:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.09)}
  .prod:active{transform:scale(.98)}
  .prod .art{height:134px;width:100%;display:block;object-fit:cover}
  .prod .meta{padding:12px 14px}
  .prod .nm{font-weight:600;font-size:16px;line-height:1.25}
  .prod .row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
  .prod .pr{font-family:var(--mono);font-weight:600;color:var(--accent-ink)}
  .prod .dest{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .ticket{background:var(--card);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;min-height:0;overflow-y:auto}
  .thead{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:600;display:flex;justify-content:space-between;align-items:center}
  .thead .mfolio{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .thead a{color:var(--accent-ink);font-size:12px;cursor:pointer;font-weight:600}
  .svc{display:flex;gap:6px;padding:12px 14px 0}
  .svc button{flex:1;padding:9px;font-weight:600;font-size:13px;background:var(--paper);color:var(--muted);border:1px solid var(--line)}
  .svc button.active{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .canalsel{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px 0}
  .canalchip{padding:8px 12px;font-size:12px;font-weight:600;border-radius:999px;background:var(--paper);color:var(--muted);border:1px solid var(--line)}
  .canalchip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .cli{padding:10px 14px 0}.cli input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;margin-bottom:6px;font-size:13px}
  .lines{flex:1 1 auto;padding:12px 14px;min-height:40px}
  .empty{color:var(--muted);text-align:center;padding:30px 8px;font-size:14px;line-height:1.5}
  .line{border-bottom:1px dashed var(--line);padding:10px 0;display:flex;gap:8px}
  .line .lname{font-weight:600;font-size:14px}.line .lmod{font-size:12px;color:var(--muted);margin-top:2px}
  .line .lnote{font-size:12px;color:var(--accent-ink);font-style:italic;margin-top:2px}
  .line .lprice{font-family:var(--mono);font-weight:600;font-size:14px;white-space:nowrap}
  .line .rm{background:none;color:var(--muted);font-size:16px;padding:0 4px;align-self:flex-start}.line .rm:hover{color:var(--red)}
  .totals{padding:12px 14px;border-top:2px solid var(--ink);position:sticky;bottom:0;background:var(--card);z-index:2}
  .trow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
  .trow.tot{font-size:19px;font-weight:700;color:var(--ink);padding-top:8px}
  .extra-btns{display:flex;gap:6px;margin:8px 0}
  .extra-btns button{flex:1;background:var(--paper);border:1px solid var(--line);padding:7px;font-size:12px;font-weight:600;color:var(--muted)}
  .pay{width:100%;padding:13px;background:var(--green);color:#fff;font-weight:700;font-size:16px;margin-top:4px}
  .pay.amber{background:var(--accent);color:#2c1c04}
  .pay:disabled{background:#cfc9bd;color:#fff;cursor:not-allowed}
  .paymesa{display:flex;gap:8px;margin-top:4px}.paymesa .pay{margin-top:0}

  /* KDS */
  .kds{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .ko{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border-left-width:6px}
  .ko.listo{border-color:var(--green)}
  .ko-fresh{border-left-color:var(--green)}.ko-warn{border-left-color:var(--accent)}.ko-late{border-left-color:var(--red)}
  .ko-late .ko-head .timer{color:var(--red);font-weight:700}.ko-warn .ko-head .timer{color:var(--accent-ink)}
  .ko-ready{border-left-color:var(--green);opacity:.85}
  .allday{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--ink);color:#fff;border-radius:12px;padding:10px 14px;margin-bottom:14px}
  .allday .ad-lbl{font-weight:700;font-size:13px;opacity:.8}
  .allday .ad-chip{background:rgba(255,255,255,.14);padding:5px 11px;border-radius:999px;font-size:13px}
  .allday .ad-chip b{color:var(--accent)}
  .hbars{display:flex;align-items:flex-end;gap:5px;height:130px;padding-top:8px}
  .hbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .hbar-fill{width:100%;max-width:26px;background:var(--accent);border-radius:5px 5px 0 0;min-height:3px;transition:height .2s}
  .hbar-lbl{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
  .ko-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;font-weight:600;border-bottom:1px solid var(--line)}
  .ko-head .folio{font-family:var(--mono)}.ko-head .timer{font-family:var(--mono);font-size:13px}.ko-head .timer.warn{color:var(--red)}
  .ko-srv{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:0 14px;margin-top:6px}
  .ko-body{padding:8px 14px;flex:1}
  .ko-item{font-size:14px;padding:4px 0}.ko-item .m{font-size:12px;color:var(--muted)}.ko-item .n{font-size:12px;color:var(--accent-ink);font-style:italic}
  .ko-foot{padding:10px 14px;border-top:1px solid var(--line)}.ko-foot button{width:100%;padding:9px;font-weight:600;font-size:13px}
  .b-listo{background:var(--accent);color:#2c1c04}.b-entregar{background:var(--green);color:#fff}

  /* MESAS */
  .mesas{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
  .mesa{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;text-align:center;transition:transform .08s,box-shadow .12s;display:flex;flex-direction:column}
  .mesa:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.09)}
  .mesa:active{transform:scale(.98)}
  .mesa .art{width:100%;height:130px;display:block}
  /* touch: blancos de toque cómodos */
  .btn,.pay,.cat,.modal-foot button,.modal-foot a,.paytabs button,.svc button,.cuenta-btn{min-height:46px;display:inline-flex;align-items:center;justify-content:center}
  .mesa .mbody{padding:10px 12px 12px}
  .mesa .ms{font-size:12px;font-weight:600;margin-top:2px}
  .mesa.libre .ms{color:var(--green)}.mesa.ocupada .ms{color:var(--red)}.mesa.cuenta .ms{color:var(--accent-ink);font-weight:600}
  .mesa .mtot{font-family:var(--mono);font-weight:600;font-size:15px;margin-top:3px}
  .mesa .cuenta-btn{margin-top:8px;width:100%;background:var(--blue-bg);color:var(--blue);font-weight:600;font-size:12px;padding:6px;border:1px solid var(--blue-bg)}
  .mesa .pay-btn{margin-top:6px;width:100%;background:var(--green);color:#fff;font-weight:700;font-size:13px;padding:8px;border:none;border-radius:9px;cursor:pointer}
  .mesa .lib-btn{margin-top:4px;width:100%;background:none;color:var(--muted);font-size:12px;padding:4px;border:none;cursor:pointer;text-decoration:underline}

  /* MODAL */
  .ov{position:fixed;inset:0;background:rgba(20,18,12,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
  .ov.show{display:flex}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;padding:20px}
  .modal h3{font-family:'Bricolage Grotesque';margin:0 0 2px;font-size:20px}.modal .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .grp{margin-bottom:14px}.grp .glabel{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;justify-content:space-between}
  .grp .req{font-size:11px;color:var(--red);font-weight:600;text-transform:uppercase}
  .opt{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer}
  .opt:hover{border-color:var(--accent)}.opt input{accent-color:var(--accent);width:17px;height:17px}
  .opt .onm{flex:1;font-size:14px}.opt .od{font-family:var(--mono);font-size:13px;color:var(--accent-ink)}
  .field{margin-bottom:12px}.field label{display:block;font-weight:600;font-size:13px;margin-bottom:5px}
  .field input,.field select{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:15px}
  .field input.mono{font-family:var(--mono);font-size:18px}
  .nota{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px}
  .modal-foot{display:flex;gap:8px;margin-top:14px}.modal-foot button{flex:1;padding:12px;font-weight:700;font-size:15px}
  .btn-ghost{background:var(--paper);color:var(--ink)}.btn-primary{background:var(--ink);color:#e8e3d8}.btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .paytabs{display:flex;gap:6px;margin-bottom:12px}.paytabs button{flex:1;padding:9px;font-size:13px;font-weight:600;background:var(--paper);border:1px solid var(--line);color:var(--muted)}
  .paytabs button.active{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .bignum{font-family:var(--mono);font-size:30px;font-weight:700;text-align:center;padding:6px 0}
  .cambio{text-align:center;font-weight:600;font-family:var(--mono);font-size:16px;min-height:22px}
  .breakdown{background:var(--paper);border-radius:10px;padding:12px 14px;margin-bottom:12px;font-family:var(--mono);font-size:14px}
  .breakdown .b{display:flex;justify-content:space-between;padding:3px 0}.breakdown .b.hl{border-top:1px dashed var(--line);margin-top:4px;padding-top:6px;font-weight:600}
  .result{text-align:center;padding:14px;border-radius:10px;font-weight:700;font-size:18px;margin-top:6px}
  .result.faltante{background:var(--red-bg);color:var(--red)}.result.sobrante{background:#fdf3df;color:var(--accent-ink)}.result.cuadrado{background:var(--green-bg);color:var(--green)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#e8e3d8;padding:12px 20px;border-radius:10px;font-weight:600;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{background:var(--green);color:#fff;font-size:15px;padding:14px 24px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .resv-fecha{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;margin:14px 0 8px;text-transform:capitalize}
  .resv{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 0;border-bottom:1px solid var(--line)}
  .resv-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .resv-hora{font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;min-width:48px}
  .resv-nom{font-weight:600}
  .resv-sub{color:var(--muted);font-size:13px;margin-top:2px}
  .resv-acc{display:flex;gap:6px;flex-wrap:wrap}
  .chip.ok{background:#e7f5ec;color:var(--green)}

<script>
// ===========================================================================

const API = {
  get token(){return localStorage.getItem('cp_token');},
  set token(v){v?localStorage.setItem('cp_token',v):localStorage.removeItem('cp_token');},
  async call(method,path,body){
    const r=await fetch(path,{method,headers:{'Content-Type':'application/json',...(this.token?{Authorization:'Bearer '+this.token}:{})},body:body?JSON.stringify(body):undefined});
    if(r.status===401&&this.token){this.token=null;boot();throw new Error('Sesión expirada');}
    const data=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(data.error||('Error '+r.status));
    return data;
  },
  get(p){return this.call('GET',p);},post(p,b){return this.call('POST',p,b);},patch(p,b){return this.call('PATCH',p,b);},del(p){return this.call('DELETE',p);},
};
const money=n=>'$'+(+(n||0)).toFixed(2);
function ivaTasa(){const f=(app.tenant&&app.tenant.fiscal)||app._fiscal||{};return f.ivaTasa!=null?+f.ivaTasa:16;}

ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});

let tt;function toast(m,opts){opts=opts||{};const t=$('#toast');t.textContent=m;t.classList.toggle('ok',opts.tipo==='ok');t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),opts.ms||2400);}

function artBurger(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdf4e2"/><stop offset="1" stop-color="#f6e0bc"/></linearGradient><linearGradient id="btop" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f2b765"/><stop offset="1" stop-color="#dd9038"/></linearGradient><linearGradient id="bbot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6a249"/><stop offset="1" stop-color="#cf8a32"/></linearGradient><linearGradient id="bpat" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#824a26"/><stop offset="1" stop-color="#5e3318"/></linearGradient></defs><rect width="160" height="120" fill="url(#bbg)"/><ellipse cx="80" cy="100" rx="54" ry="7" fill="#7a4a10" opacity=".12"/><path d="M28 50c0-23 24-35 52-35s52 12 52 35z" fill="url(#btop)"/><path d="M44 30c9-8 24-11 40-9" stroke="#ffe6b8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity=".55"/><g fill="#fbe3ac"><ellipse cx="62" cy="34" rx="3" ry="1.7" transform="rotate(-18 62 34)"/><ellipse cx="80" cy="28" rx="3" ry="1.7"/><ellipse cx="98" cy="34" rx="3" ry="1.7" transform="rotate(18 98 34)"/><ellipse cx="71" cy="40" rx="3" ry="1.7" transform="rotate(-10 71 40)"/><ellipse cx="90" cy="40" rx="3" ry="1.7" transform="rotate(10 90 40)"/></g><path d="M26 50h108c-6 8-15 4-21 8-6 4-12 0-18 4-6 4-12 0-18 0-6 0-12 4-18 0-6-4-15 0-15-12z" fill="#7cb949"/><path d="M30 58h100v7l-9 8-7-6-9 8-7-6-9 8-7-6-9 8-7-6-9 8-7-6-7 4z" fill="#f4b740"/><rect x="28" y="66" width="104" height="15" rx="7" fill="url(#bpat)"/><rect x="30" y="80" width="100" height="16" rx="8" fill="url(#bbot)"/></svg>`;}
function artSoda(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fb"/><stop offset="1" stop-color="#dae6f4"/></linearGradient><linearGradient id="cup" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#b8362a"/><stop offset=".5" stop-color="#e1503c"/><stop offset="1" stop-color="#b8362a"/></linearGradient></defs><rect width="160" height="120" fill="url(#sbg)"/><ellipse cx="80" cy="104" rx="32" ry="6" fill="#16253f" opacity=".12"/><rect x="94" y="16" width="6" height="36" rx="3" fill="#e8e3d8" transform="rotate(13 97 34)"/><path d="M52 38h56l-7 60a6 6 0 0 1-6 5H65a6 6 0 0 1-6-5z" fill="url(#cup)"/><rect x="50" y="46" width="60" height="13" fill="#f7f4ee"/><rect x="58" y="51" width="44" height="3" rx="1.5" fill="#b8362a" opacity=".55"/><rect x="48" y="30" width="64" height="10" rx="4" fill="#cf3322"/><path d="M60 30c2-8 38-8 40 0z" fill="#d84a38"/></svg>`;}
function artFries(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdf4e2"/><stop offset="1" stop-color="#f6e0bc"/></linearGradient><linearGradient id="frb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e1503c"/><stop offset="1" stop-color="#bf3526"/></linearGradient><linearGradient id="fr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8d370"/><stop offset="1" stop-color="#e0a23c"/></linearGradient></defs><rect width="160" height="120" fill="url(#fbg)"/><ellipse cx="80" cy="104" rx="34" ry="6" fill="#7a4a10" opacity=".12"/><g fill="url(#fr)"><rect x="58" y="40" width="7" height="50" rx="3"/><rect x="68" y="30" width="7" height="60" rx="3"/><rect x="78" y="36" width="7" height="54" rx="3"/><rect x="88" y="26" width="7" height="64" rx="3"/><rect x="98" y="42" width="7" height="48" rx="3"/></g><path d="M50 64h60l-6 36a6 6 0 0 1-6 5H62a6 6 0 0 1-6-5z" fill="url(#frb)"/><path d="M50 64h60l-1 11H51z" fill="#a82e21"/></svg>`;}
function artAgua(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="abg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdeef4"/><stop offset="1" stop-color="#f6d8e4"/></linearGradient><linearGradient id="aliq" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f48fb0"/><stop offset="1" stop-color="#e85f8c"/></linearGradient></defs><rect width="160" height="120" fill="url(#abg)"/><ellipse cx="80" cy="104" rx="28" ry="6" fill="#7a1030" opacity=".12"/><rect x="92" y="20" width="5" height="40" rx="2.5" fill="#fff" opacity=".8" transform="rotate(10 94 40)"/><path d="M58 34h44l-5 60a6 6 0 0 1-6 5H69a6 6 0 0 1-6-5z" fill="#ffffff" opacity=".55"/><path d="M60 48h40l-4 46a5 5 0 0 1-5 4H69a5 5 0 0 1-5-4z" fill="url(#aliq)"/><rect x="66" y="40" width="11" height="11" rx="3" fill="#fff" opacity=".55"/><rect x="84" y="44" width="9" height="9" rx="2.5" fill="#fff" opacity=".5"/><circle cx="100" cy="34" r="9" fill="#8fce4f"/><circle cx="100" cy="34" r="6" fill="#c7e89a"/></svg>`;}
function artPlato(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="pl" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ece7db"/></radialGradient></defs><rect width="160" height="120" fill="#f1efe8"/><ellipse cx="80" cy="64" rx="40" ry="38" fill="#000" opacity=".06"/><circle cx="80" cy="60" r="38" fill="url(#pl)" stroke="#e0d9c8"/><circle cx="80" cy="60" r="24" fill="none" stroke="#e6dfce" stroke-width="2"/><rect x="40" y="44" width="3" height="32" rx="1.5" fill="#c9c1ad"/><rect x="117" y="44" width="3" height="32" rx="1.5" fill="#c9c1ad"/></svg>`;}
function prodArt(prod,catName){
  if(prod.foto)return `<img class="art" src="${prod.foto}" alt="${prod.nombre}" onerror="this.outerHTML=prodArtFallback('${(catName||'').replace(/'/g,'')}','${prod.nombre.replace(/'/g,'')}')">`;
  return prodArtFallback(catName,prod.nombre);
}
function prodArtFallback(catName,nombre){
  const n=(nombre||'').toLowerCase(),c=(catName||'').toLowerCase();
  if(/agua|limonada|jamaica|horchata/.test(n))return artAgua();
  if(/refresco|bebida|soda|coca/.test(n)||c.includes('bebida')&&!/agua/.test(n))return artSoda();
  if(/papa|fries|aro|nugget/.test(n))return artFries();
  if(/hamburg|burger|bbq|doble|combo|sandwich|pollo/.test(n)||c.includes('hamburg'))return artBurger();
  if(c.includes('acompa'))return artFries();
  if(c.includes('bebida'))return artSoda();
  return artPlato();
}
function mesaArt(estado){
  const col={libre:['#e7f3ea','#2f8f4e'],ocupada:['#fbeed8','#e0841a'],cuenta:['#e7eef6','#3b6ea5']}[estado]||['#f1efe8','#8c857a'];

  return `<svg class="art" viewBox="0 0 150 118" xmlns="http://www.w3.org/2000/svg"><rect width="150" height="118" fill="${bg}"/><rect x="40" y="18" width="70" height="14" rx="4" fill="${c}" opacity=".85"/><rect x="40" y="86" width="70" height="14" rx="4" fill="${c}" opacity=".85"/><rect x="22" y="40" width="14" height="38" rx="4" fill="${c}" opacity=".85"/><rect x="114" y="40" width="14" height="38" rx="4" fill="${c}" opacity=".85"/><rect x="44" y="38" width="62" height="42" rx="10" fill="#fff" stroke="${c}" stroke-width="2"/><circle cx="75" cy="59" r="13" fill="${bg}"/></svg>`;}

const IC={resumen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
  pos:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  cocina:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11h16M4 11a8 8 0 0 1 16 0M6 11v6a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-6"/></svg>',
  menu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/></svg>',

  mesas:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>',
  reportes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="18" y1="20" x2="18" y2="10"/></svg>',
  promociones:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v8a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-8"/><rect x="2" y="7" width="20" height="5" rx="1"/><path d="M12 21V7M12 7S11 3 8.5 3 5 5 7 7h5zM12 7s1-4 3.5-4S19 5 17 7h-5z"/></svg>',
  ajustes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 3.6 15H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 6.6V6a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 7.4l.06.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  rh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  asistencia:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',

  caja:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M3 8l2-4h14l2 4M8 14h.01M16 14h.01M11 14h2"/></svg>'};
const NAV_LABELS={resumen:'Resumen',pos:'Punto de venta',cocina:'Cocina',menu:'Menú',inventario:'Inventario',mesas:'Mesas',asistencia:'Asistencia',reportes:'Reportes',promociones:'Promociones',rh:'Personal',ajustes:'Ajustes',reservas:'Reservas',caja:'Caja'};
const NAV_ROLES={
  admin:['resumen','caja','pos','cocina','menu','inventario','mesas','reservas','asistencia','reportes','promociones','rh','ajustes'],
  gerente:['resumen','caja','pos','cocina','menu','inventario','mesas','reservas','asistencia','reportes','promociones','rh','ajustes'],
  cajero:['caja','pos','cocina','mesas','reservas','asistencia'],
  mesero:['pos','mesas','cocina','asistencia'],
  cocinero:['cocina','asistencia'],
  repartidor:['cocina','asistencia']
};
function esAdmin(){return app.rol==='admin'||app.rol==='gerente';}
function puedeCobrar(){return ['admin','gerente','cajero'].includes(app.rol);}
function rolViews(){return NAV_ROLES[app.rol]||['pos','asistencia'];}
function puedeVer(v){return rolViews().includes(v);}
function vistaInicial(){return rolViews()[0]||'pos';}
function NAV(){return rolViews().map(k=>[k,NAV_LABELS[k]]);}

// ===========================================================================
//  Boot / login
// ===========================================================================
async function boot(){
  if(kdsTimer){clearInterval(kdsTimer);kdsTimer=null;}
  if(!API.token){renderLogin();return;}
  try{
    const me=await API.get('/api/me');app.rol=me.rol;app.tenant=me.tenant;app.username=me.username;
    if(app.rol==='superadmin'){renderSuper();return;}
    app.miSucursal=me.sucursalId;
    app.sucursales=await API.get('/api/sucursales');
    if(!esAdmin())app.sucursalId=app.miSucursal||app.sucursales[0].id;
    else if(!app.sucursalId)app.sucursalId=app.miSucursal||app.sucursales[0].id;
    await refreshTurno();
    app.menu=await API.get('/api/menu');
    try{app.canales=await API.get('/api/canales');}catch{app.canales=[];}
    renderShell();go(vistaInicial());
  }catch(e){API.token=null;renderLogin();}
}
function renderLogin(){
  $('#app').innerHTML=`<div class="login"><form class="login-card" id="lf">
    <div class="logo">Jefe<b>Burgers</b></div><div class="tg">Consola de operación</div>
    <label>Usuario</label><input id="lu" autocomplete="username" autofocus>
    <label>Contraseña</label><input id="lp" type="password" autocomplete="current-password">
    <button type="submit">Entrar</button><div class="err" id="le"></div></form></div>`;
  $('#lf').onsubmit=async ev=>{ev.preventDefault();$('#le').textContent='';
    try{const r=await API.post('/api/auth/login',{username:$('#lu').value.trim(),password:$('#lp').value});API.token=r.token;app.tenant=r.tenant;boot();}
    catch(e){$('#le').textContent=e.message;}};
}
async function refreshTurno(){app.turno=await API.get('/api/caja/turno-actual?sucursalId='+app.sucursalId);}

// ===========================================================================
//  Shell
// ===========================================================================
function brandSidebar(){
  if(app.tenant&&app.tenant.logo)return `<img src="${app.tenant.logo}" class="brandlogo" alt="${app.tenant.nombre||''}">`;
  const nm=app.tenant&&app.tenant.nombre?app.tenant.nombre:'ComandaPro';
  return `<span class="brandtext">${nm}</span>`;
}
function renderShell(){
  $('#app').innerHTML=`<div class="shell">
    <nav class="sidebar"><div class="logo" id="brand">${brandSidebar()}</div><div class="nav" id="nav"></div>
      <div class="side-foot"><span>v0.9.13 · API</span><button id="logout">Salir</button></div></nav>
    <div class="app-main">
      <div class="topbar"><div class="vtitle" id="vtitle">Resumen</div><div class="spacer"></div>
        <select class="suc" id="sucSel"></select>
        <div class="turno-pill off" id="turnoPill">Turno cerrado</div>
        <button class="btn accent" id="btnTurno">Abrir turno</button>
      </div><div class="view" id="view"></div></div></div>`;
  $('#logout').onclick=()=>{API.token=null;app.sucursalId=null;app.rol=null;app.tenant=null;boot();};
  $('#sucSel').onchange=async e=>{app.sucursalId=e.target.value;app.pos={folio:null,pedido:null,tipoServicio:'mostrador',mesaId:null,cat:null};await refreshTurno();go(app.vista);};
  $('#btnTurno').onclick=()=>app.turno?modalCerrarTurno():modalAbrirTurno();
  renderTopbar();renderNav();
}
function renderTopbar(){
  $('#sucSel').innerHTML=app.sucursales.map(s=>`<option value="${s.id}" ${s.id===app.sucursalId?'selected':''}>${s.nombre}</option>`).join('');
  $('#sucSel').disabled=!esAdmin();
  $('#sucSel').title=esAdmin()?'Cambiar de sucursal':'Tu sucursal asignada';
  const pill=$('#turnoPill'),btn=$('#btnTurno');
  const caja=puedeCobrar();
  pill.style.display=caja?'':'none';btn.style.display=caja?'':'none';
  if(app.turno){pill.className='turno-pill on';pill.textContent='Turno abierto · '+money(app.turno.fondoInicial);btn.textContent='Cerrar turno';btn.classList.remove('accent');}
  else{pill.className='turno-pill off';pill.textContent='Turno cerrado';btn.textContent='Abrir turno';btn.classList.add('accent');}
}
async function renderNav(){
  let badge=0;try{badge=(await API.get('/api/cocina?sucursalId='+app.sucursalId)).length;}catch{}
  $('#nav').innerHTML=NAV().map(([k,l])=>`<button data-v="${k}" class="${k===app.vista?'active':''}">${IC[k]}<span>${l}</span>${k==='cocina'&&badge?`<span class="badge">${badge}</span>`:''}</button>`).join('');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
}
function go(v){if(!puedeVer(v))v=vistaInicial();app.vista=v;$('#vtitle').textContent=(NAV().find(n=>n[0]===v)||['',''])[1];renderNav();
  if(kdsTimer){clearInterval(kdsTimer);kdsTimer=null;}

function cobrar(){
  const ped=app.pos.pedido;if(!ped||!ped.lineas.length){toast('Agrega productos');return;}
  const canal=(app.canales||[]).find(c=>c.id===ped.canalId);
  const metodos=canal&&canal.esApp?['plataforma','tarjeta','efectivo']:['efectivo','tarjeta','transferencia'];
  const nm={plataforma:'Plataforma',efectivo:'Efectivo',tarjeta:'Tarjeta',transferencia:'Transferencia'};
  const r2c=n=>Math.round(n*100)/100;
  let metodo=metodos[0];let tipPct=0;let tipMonto=0;
  const propina=()=>tipPct!=null?r2c(ped.total*tipPct/100):r2c(tipMonto||0);
  const totalCon=()=>r2c(ped.total+propina());
  const render=()=>{
    const pr=propina(),tc=totalCon();
    modal.innerHTML=`<h3 id="cobTit">Cobrar ${money(tc)}</h3><div class="sub" id="cobSub">${ped.folio}${canal&&canal.esApp?' · '+canal.nombre:''}${pr>0?' · propina '+money(pr):''}</div>

      ${metodo!=='plataforma'?`<button class="lnk-split" id="btnDividir">Dividir cuenta entre varios pagos</button>`:''}

    if(metodo==='efectivo'){const ri=$('#recib');ri.addEventListener('input',actualizaCambio);setTimeout(()=>ri.focus(),50);}

function modalDividir(ped){
  let n=2;const r2c=v=>Math.round(v*100)/100;
  const render=()=>{
    const base=Math.floor(ped.total/n*100)/100;
    const montos=Array.from({length:n},(_,i)=>i===n-1?r2c(ped.total-base*(n-1)):base);
    modal.innerHTML=`<h3>Dividir ${money(ped.total)}</h3><div class="sub">${ped.folio} · cada quien paga su parte</div>
      <div class="field"><label>¿En cuántas partes?</label><div class="tip-row">${[2,3,4,5,6].map(k=>`<button class="tip-btn ${k===n?'active':''}" data-n="${k}">${k}</button>`).join('')}</div></div>
      <div id="splitRows">${montos.map((mo,i)=>`<div class="cols2" style="margin-bottom:6px;align-items:center"><select class="splMet" data-i="${i}"><option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option><option value="transferencia">Transfer.</option></select><input class="splMon mono" data-i="${i}" type="number" value="${mo}"></div>`).join('')}</div>
      <div id="splitSum" class="sub" style="font-weight:600"></div>
      <div class="modal-foot"><button class="btn-ghost" id="dvBack">Volver</button><button class="btn-primary" id="dvOk">Cobrar dividido</button></div>`;
    modal.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>{n=+b.dataset.n;render();});
    const sum=()=>Array.from(modal.querySelectorAll('.splMon')).reduce((s,el)=>s+(+el.value||0),0);
    const upd=()=>{const s=r2c(sum());const ok=Math.abs(s-ped.total)<0.01;$('#splitSum').textContent=`Suma: ${money(s)} / ${money(ped.total)}`;$('#splitSum').style.color=ok?'var(--green)':'var(--red)';};
    modal.querySelectorAll('.splMon').forEach(el=>el.oninput=upd);upd();
    $('#dvBack').onclick=()=>cobrar();
    $('#dvOk').onclick=async()=>{
      const pagos=Array.from(modal.querySelectorAll('.splMon')).map((el,i)=>({metodo:modal.querySelector('.splMet[data-i="'+i+'"]').value,monto:r2c(+el.value||0)})).filter(p=>p.monto>0);
      const s=pagos.reduce((a,p)=>a+p.monto,0);
      if(Math.abs(s-ped.total)>0.01){toast('La suma debe ser igual al total');return;}
      const recibido=pagos.filter(p=>p.metodo==='efectivo').reduce((a,p)=>a+p.monto,0);
      try{const p=await API.post(`/api/pedidos/${ped.folio}/cobrar`,{pagos,recibido});closeModal();ticketFinal(p);
        const wasMesa=app.pos.tipoServicio==='mesa';app.pos={folio:null,pedido:null,tipoServicio:wasMesa?'mostrador':app.pos.tipoServicio,mesaId:null,cat:app.pos.cat};renderNav();
      }catch(e){toast(e.message);}
    };
  };
  render();ov.classList.add('show');
}

  <div class="muted">${fecha}</div>
  ${canal&&canal.esApp?`<div class="muted">Canal: ${canal.nombre}</div>`:''}

  <hr>
  ${p.lineas.map(l=>`<div class="it"><div class="row"><span>${l.cantidad}× ${l.nombre}</span><span>${money(l.importe)}</span></div>${(l.modificadores||[]).map(m=>`<div class="mod">+ ${m.opcionNombre}</div>`).join('')}${l.notas?`<div class="mod">Nota: ${l.notas}</div>`:''}</div>`).join('')}

function imprimirTicket(p){

async function vCocina(){

async function pintarCocina(){
  const ordenes=await API.get('/api/cocina?sucursalId='+app.sucursalId);
  if(!ordenes.length){$('#view').innerHTML=`<div class="panel"><div class="empty">No hay órdenes en cocina.<br>Cobra un pedido (o manda una comanda de mesa) y aparecerá aquí.</div></div>`;return;}
  const now=Date.now();
  // Conteo all-day: total de piezas pendientes por producto (no entregadas)
  const allday={};
  ordenes.forEach(p=>{if(!p.listo)p.items.forEach(l=>{allday[l.nombre]=(allday[l.nombre]||0)+l.cantidad;});});
  const adArr=Object.entries(allday).sort((a,b)=>b[1]-a[1]);
  const tier=min=>min>=12?'late':min>=6?'warn':'fresh';
  $('#view').innerHTML=`
  ${adArr.length?`<div class="allday"><span class="ad-lbl">Por preparar:</span>${adArr.map(([n,q])=>`<span class="ad-chip"><b>${q}×</b> ${n}</span>`).join('')}</div>`:''}
  <div class="kds">${ordenes.map(p=>{
    const min=Math.floor((now-new Date(p.recibido).getTime())/60000);
    const srv=p.tipoServicio==='mesa'?mesaNombre(p.mesaId):(p.tipoServicio==='domicilio'?'🛵 Domicilio':'🧾 Mostrador');
    const tk=p.listo?'ready':tier(min);
    return `<div class="ko ko-${tk} ${p.listo?'listo':''}"><div class="ko-head"><span class="folio">${p.folio}</span><span class="timer">${p.listo?'LISTO':min+' min'}</span></div><div class="ko-srv">${srv}</div>
      <div class="ko-body">${p.items.map(l=>`<div class="ko-item">${l.cantidad}× ${l.nombre}${l.modificadores.length?`<div class="m">${l.modificadores.join(', ')}</div>`:''}${l.notas?`<div class="n">“${l.notas}”</div>`:''}</div>`).join('')}</div>
      <div class="ko-foot">${p.listo?`<button class="b-entregar" data-entregar="${p.folio}">Entregar</button>`:`<button class="b-listo" data-listo="${p.folio}">Marcar listo</button>`}</div></div>`;}).join('')}</div>`;
  document.querySelectorAll('[data-listo]').forEach(b=>b.onclick=async()=>{await API.post(`/api/cocina/${b.dataset.listo}/listo`);pintarCocina();});
  document.querySelectorAll('[data-entregar]').forEach(b=>b.onclick=async()=>{await API.post(`/api/cocina/${b.dataset.entregar}/entregar`);toast('Orden entregada');pintarCocina();renderNav();});
}

function listaCompraTexto(){
  const f=app._faltantes||{lista:[],total:0};
  const nombre=(app.tenant&&app.tenant.nombre)||'Restaurante';

  let t=`🛒 *Lista de compras* — ${nombre}\n${fecha}\n\n`;
  f.lista.forEach(i=>{t+=`• ${i.nombre}: ${i.sug} ${i.unidad}  (~${money(i.costoSug)})\n`;});
  t+=`\nTotal estimado: ${money(f.total)}`;

}
async function copiarListaCompra(){

async function abrirMesa(mesaId){
  if(!app.turno){toast('Abre el turno antes de atender mesas');return;}
  const m=(app._mesas||[]).find(x=>x.id===mesaId);
  try{

function pct(part,total){return total>0?Math.round(part/total*100):0;}

const RES_EST={pendiente:{l:'Pendiente',c:'barra'},confirmada:{l:'Confirmada',c:'cocina'},sentada:{l:'Sentada',c:'ok'},cancelada:{l:'Cancelada',c:'low'},no_show:{l:'No llegó',c:'low'}};
function fmtFechaLarga(f){try{const[a,m,d]=f.split('-');return new Date(+a,+m-1,+d).toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});}catch{return f;}}
async function vReservas(){
  const hoy=new Date().toISOString().slice(0,10);
  const [reservas,mesas]=await Promise.all([API.get('/api/reservas?sucursalId='+app.sucursalId),API.get('/api/mesas?sucursalId='+app.sucursalId)]);
  app._reservas=reservas;app._mesas=mesas;
  const sucNombre=app.sucursales.find(s=>s.id===app.sucursalId)?.nombre||'';
  // mostrar de hoy en adelante; las pasadas van en una sección colapsada al final
  const futuras=reservas.filter(r=>r.fecha>=hoy&&r.estado!=='cancelada'&&r.estado!=='no_show');
  const otras=reservas.filter(r=>!(r.fecha>=hoy&&r.estado!=='cancelada'&&r.estado!=='no_show'));
  const porFecha={};futuras.forEach(r=>{(porFecha[r.fecha]=porFecha[r.fecha]||[]).push(r);});
  const fechas=Object.keys(porFecha).sort();
  const tarjeta=r=>`<div class="resv"><div class="resv-main"><div class="resv-top"><span class="resv-hora">${r.hora}</span><span class="resv-nom">${r.nombre}</span><span class="chip ${RES_EST[r.estado].c}">${RES_EST[r.estado].l}</span></div>
      <div class="resv-sub">${r.personas} pers.${r.mesaNombre?' · '+r.mesaNombre:''}${r.telefono?' · '+r.telefono:''}${r.notas?' · '+r.notas:''}</div></div>
    <div class="resv-acc">${r.estado==='pendiente'?`<button class="btn" data-rconf="${r.id}" style="font-size:12px;padding:7px 10px;min-height:auto">Confirmar</button>`:''}${r.estado!=='sentada'?`<button class="btn dark" data-rsent="${r.id}" style="font-size:12px;padding:7px 10px;min-height:auto">Sentar</button>`:''}<button class="btn" data-redit="${r.id}" style="font-size:12px;padding:7px 10px;min-height:auto">Editar</button><button class="btn" data-rcanc="${r.id}" style="font-size:12px;padding:7px 10px;min-height:auto;color:var(--red)">Cancelar</button></div></div>`;
  $('#view').innerHTML=`<div class="panel" style="margin-bottom:16px"><h3 style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">Reservas · ${sucNombre} <span class="small">${futuras.length} próxima(s)</span><button class="btn accent" id="newReserva" style="margin-left:auto;font-size:13px">+ Nueva reserva</button></h3>
    ${fechas.length?fechas.map(f=>`<div class="resv-fecha">${f===hoy?'Hoy · ':''}${fmtFechaLarga(f)}</div>${porFecha[f].map(tarjeta).join('')}`).join(''):'<div class="empty">No hay reservas próximas. Crea una con "Nueva reserva".</div>'}</div>
    ${otras.length?`<div class="panel"><h3>Historial <span class="small">canceladas, no llegó o pasadas</span></h3>${otras.slice(0,30).map(tarjeta).join('')}</div>`:''}`;
  $('#newReserva').onclick=()=>modalReserva(null);
  document.querySelectorAll('[data-rconf]').forEach(b=>b.onclick=()=>cambiarReserva(b.dataset.rconf,{estado:'confirmada'}));
  document.querySelectorAll('[data-rsent]').forEach(b=>b.onclick=()=>cambiarReserva(b.dataset.rsent,{estado:'sentada'}));
  document.querySelectorAll('[data-rcanc]').forEach(b=>b.onclick=()=>cambiarReserva(b.dataset.rcanc,{estado:'cancelada'}));
  document.querySelectorAll('[data-redit]').forEach(b=>b.onclick=()=>modalReserva(app._reservas.find(r=>r.id===b.dataset.redit)));
}

  if(esAdmin())renderFinanciero();

  <h2>DECLARACIONES</h2>
  <p><b>I.</b> Declara EL COMITENTE que se dedica a la elaboración y venta de alimentos y bebidas bajo el nombre comercial "<b>${nomComercial}</b>", y que desea encomendar a EL COMISIONISTA la promoción y venta de sus productos en los términos de este contrato.</p>
  <p><b>II.</b> Declara EL COMISIONISTA ser persona física mayor de edad, que cuenta con los conocimientos, elementos y recursos propios para desempeñar la comisión; que actúa como comerciante independiente y <b>no</b> bajo subordinación; que se encuentra inscrito (o se inscribirá) en el RFC ante el SAT y que expedirá el CFDI correspondiente por las comisiones que perciba.</p>

  <p><span class="cl">SEGUNDA. Independencia y ausencia de relación laboral.</span> EL COMISIONISTA desempeñará su encargo de forma <b>independiente</b>, con plena libertad para fijar sus horarios, presentarse o ausentarse cuando lo desee, y para emplear sus propios medios y, en su caso, los auxiliares o terceros que él contrate y remunere por su cuenta. <b>No existe subordinación, jornada, exclusividad ni dirección permanente</b> de EL COMITENTE sobre EL COMISIONISTA. En consecuencia, las partes reconocen que no se genera relación de trabajo en términos de la Ley Federal del Trabajo, ni obligación de seguridad social a cargo de EL COMITENTE respecto de EL COMISIONISTA.</p>
  <p><span class="cl">TERCERA. Comisión.</span> Como única retribución, EL COMITENTE pagará a EL COMISIONISTA una comisión equivalente al <b>${pct?pct+'%':PH('','PORCENTAJE')}</b> sobre el importe de las ventas efectivamente realizadas y cobradas por su conducto. La comisión se pagará ${PH('','PERIODICIDAD: p. ej. semanal/quincenal')} contra la entrega del CFDI que ampare dicha comisión.</p>
  <p><span class="cl">CUARTA. Instrucciones y rendición de cuentas.</span> Conforme a los artículos 286 y 298 del Código de Comercio, EL COMISIONISTA se sujetará a las instrucciones generales de EL COMITENTE respecto de precios y condiciones de venta, rendirá cuenta de las operaciones realizadas y entregará los importes que hubiere cobrado por cuenta de EL COMITENTE.</p>
  <p><span class="cl">QUINTA. Obligaciones fiscales.</span> EL COMISIONISTA es el único responsable del cumplimiento de sus obligaciones fiscales y, en su caso, de seguridad social, y expedirá CFDI por las comisiones percibidas. Las retenciones que conforme a la legislación fiscal vigente procedan serán aplicadas por EL COMITENTE.</p>
  <p><span class="cl">SEXTA. Gastos.</span> Los gastos en que incurra EL COMISIONISTA para el desempeño de su encargo correrán por su cuenta, salvo pacto expreso por escrito en contrario.</p>

function modalAbrirTurno(){
  modal.innerHTML=`<h3>Abrir turno</h3><div class="sub">Declara el fondo de cambio</div>
    <div class="field"><label>Fondo inicial</label><input id="fondo" type="number" class="mono" value="500"></div>
    <div class="modal-foot"><button class="btn-ghost" id="tCancel">Cancelar</button><button class="btn-primary" id="tOk">Abrir</button></div>`;
  ov.classList.add('show');$('#tCancel').onclick=closeModal;
  $('#tOk').onclick=async()=>{try{app.turno=await API.post('/api/caja/abrir',{sucursalId:app.sucursalId,fondoInicial:+($('#fondo').value)||0});closeModal();renderTopbar();toast('Turno abierto');go(app.vista);}catch(e){toast(e.message);}};
}
function imprimirCorte(r){
  const E=r.esperado;const suc=app.sucursales.find(s=>s.id===app.sucursalId)?.nombre||'';
  const w=window.open('','corte','width=340,height=680');if(!w){toast('Permite ventanas emergentes');return;}
  const f=new Date(r.cerrado).toLocaleString('es-MX');
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Corte</title><style>body{font-family:'Courier New',monospace;width:280px;margin:0 auto;padding:10px;font-size:12px;color:#000}.r{display:flex;justify-content:space-between;margin:3px 0}.b{font-weight:bold}hr{border:none;border-top:1px dashed #000;margin:6px 0}h2{text-align:center;font-size:15px;margin:2px 0}</style></head><body>
  <h2>CORTE DE CAJA</h2><div style="text-align:center">${(app.tenant&&app.tenant.nombre)||''} · ${suc}</div><div style="text-align:center">${f}</div><div style="text-align:center">Cerró: ${r.cerradoPor||''}</div><hr>
  <div class="r"><span>Fondo inicial</span><span>${money(E.fondoInicial)}</span></div>
  ${E.entradas?`<div class="r"><span>Entradas</span><span>${money(E.entradas)}</span></div>`:''}
  ${E.salidas?`<div class="r"><span>Retiros</span><span>-${money(E.salidas)}</span></div>`:''}
  ${E.propinasEfectivo?`<div class="r"><span>Propinas efectivo</span><span>${money(E.propinasEfectivo)}</span></div>`:''}
  <div class="r b"><span>Efectivo esperado</span><span>${money(E.efectivo)}</span></div>
  <div class="r"><span>Efectivo contado</span><span>${money(r.conteo)}</span></div>
  <div class="r b"><span>${r.resultado.toUpperCase()}</span><span>${money(Math.abs(r.diferencia))}</span></div><hr>
  <div class="r"><span>Tarjeta</span><span>${money(E.tarjeta)}</span></div>
  <div class="r"><span>Transferencia</span><span>${money(E.transferencia)}</span></div>
  <div class="r b"><span>Venta total</span><span>${money(E.ventaTotal)}</span></div>
  ${E.propinasTotal?`<div class="r"><span>Propinas a repartir</span><span>${money(E.propinasTotal)}</span></div>`:''}
  </body></html>`);
  w.document.close();setTimeout(()=>{try{w.focus();w.print();}catch(e){}},350);
}
function modalCerrarTurno(){
  const t=app.turno;
  modal.innerHTML=`<h3>Cerrar turno</h3><div class="sub">Cuenta el efectivo del cajón</div>
    <div class="field"><label>Efectivo contado</label><input id="conteo" type="number" class="mono" placeholder="0.00"></div><div id="difBox"></div>
    <div class="modal-foot"><button class="btn-ghost" id="cCancel">Cancelar</button><button class="btn-primary" id="cOk">Cerrar turno</button></div>`;
  ov.classList.add('show');$('#cCancel').onclick=closeModal;
  $('#cOk').onclick=async()=>{if($('#conteo').value===''){toast('Captura el efectivo');return;}
    try{const r=await API.post('/api/caja/cerrar',{turnoId:t.id,conteoEfectivo:+$('#conteo').value});const res=r.resultado;const E=r.esperado;
      modal.innerHTML=`<h3>Corte de turno</h3><div class="breakdown">
        <div class="b"><span>Fondo inicial</span><span>${money(E.fondoInicial)}</span></div>
        <div class="b"><span>Ventas efectivo</span><span>${money(r.esperado.efectivo - E.fondoInicial - E.entradas + E.salidas - E.propinasEfectivo)}</span></div>
        ${E.propinasEfectivo?`<div class="b"><span>Propinas efectivo (en cajón)</span><span>${money(E.propinasEfectivo)}</span></div>`:''}
        ${E.entradas?`<div class="b"><span>Entradas</span><span>${money(E.entradas)}</span></div>`:''}
        ${E.salidas?`<div class="b"><span>Retiros</span><span>-${money(E.salidas)}</span></div>`:''}
        <div class="b hl"><span>Efectivo esperado</span><span>${money(E.efectivo)}</span></div>
        <div class="b"><span>Efectivo contado</span><span>${money(r.conteo)}</span></div>
        <div class="b"><span>Ventas tarjeta</span><span>${money(E.tarjeta)}</span></div>
        <div class="b"><span>Ventas transferencia</span><span>${money(E.transferencia)}</span></div>
        <div class="b hl"><span>Venta total del turno</span><span>${money(E.ventaTotal)}</span></div>
        ${E.propinasTotal?`<div class="b"><span>Propinas a repartir</span><span>${money(E.propinasTotal)}</span></div>`:''}
      </div><div class="result ${res}">${res==='cuadrado'?'Caja cuadrada':res==='faltante'?'FALTANTE':'SOBRANTE'} ${money(Math.abs(r.diferencia))}</div>
      <div class="modal-foot"><button class="btn-ghost" id="cImpr">🖨 Imprimir corte</button><button class="btn-primary" id="cDone">Entendido</button></div>`;
      app.turno=null;renderTopbar();
      if($('#cImpr'))$('#cImpr').onclick=()=>imprimirCorte(r);
      $('#cDone').onclick=()=>{closeModal();go(app.vista);};
    }catch(e){toast(e.message);}};
}
