<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jefe Burgers — Consola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17150f;--ink2:#221f17;--paper:#f4f1ea;--card:#fff;--line:#e5dfd2;
    --accent:#e0841a;--accent-ink:#7a4708;--accent-bg:#fbeed8;
    --green:#2f8f4e;--green-bg:#e7f3ea;--red:#c8472f;--red-bg:#fbe9e4;
    --blue:#3b6ea5;--blue-bg:#e7eef6;--muted:#8c857a;--mono:'Spline Sans Mono',monospace;
  }
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);font-size:15px;height:100vh;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  #app{height:100%}

  /* LOGIN */
  .login{height:100%;display:flex;align-items:center;justify-content:center;background:var(--ink)}
  .login-card{background:var(--card);border-radius:20px;padding:34px 30px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-card .logo{font-family:'Bricolage Grotesque';font-weight:700;font-size:30px;text-align:center;margin-bottom:4px}
  .login-card .logo b{color:var(--accent)}
  .login-card .tg{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
  .login-card label{display:block;font-weight:600;font-size:13px;margin:12px 0 5px}
  .login-card input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px}
  .login-card button{width:100%;padding:13px;background:var(--accent);color:#2c1c04;font-weight:700;font-size:16px;margin-top:20px}
  .login-card .err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}

  /* SHELL */
  .shell{display:flex;height:100%}
  .sidebar{width:218px;background:var(--ink);color:#e8e3d8;display:flex;flex-direction:column;flex:0 0 auto}
  .logo{font-family:'Bricolage Grotesque';font-weight:700;font-size:21px;letter-spacing:-.02em;padding:18px 20px 14px}
  .logo b{color:var(--accent)}
  .nav{flex:1;padding:6px 10px;overflow-y:auto}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;color:#b7b0a2;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;margin-bottom:2px}
  .nav button:hover{background:#272318;color:#e8e3d8}
  .nav button.active{background:var(--accent);color:#2c1c04;font-weight:600}
  .nav svg{width:18px;height:18px;flex:0 0 auto}
  .nav .badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-family:var(--mono);padding:1px 7px;border-radius:999px;font-weight:600}
  .nav button.active .badge{background:#2c1c04;color:var(--accent)}
  .side-foot{padding:12px 16px;border-top:1px solid #2a261b;font-size:12px;color:#8c857a;display:flex;justify-content:space-between;align-items:center}
  .side-foot button{background:none;color:#b7b0a2;font-size:12px;padding:4px 8px}
  .side-foot button:hover{color:#e8e3d8}

  .app-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:13px;padding:12px 22px;background:var(--card);border-bottom:1px solid var(--line);flex:0 0 auto}
  .vtitle{font-family:'Bricolage Grotesque';font-weight:700;font-size:22px}
  .spacer{flex:1}
  select.suc{padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-weight:600;font-size:14px;background:var(--card)}
  .turno-pill{font-size:13px;padding:7px 13px;border-radius:999px;font-weight:600;font-family:var(--mono)}
  .turno-pill.off{background:var(--paper);color:var(--muted)}
  .turno-pill.on{background:var(--green-bg);color:var(--green)}
  .btn{padding:9px 15px;font-weight:600;font-size:14px;background:var(--paper);color:var(--ink);border:1px solid var(--line)}
  .btn:hover{background:#ece7dc}
  .btn.accent{background:var(--accent);color:#2c1c04;border-color:var(--accent)}
  .btn.dark{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .view{flex:1;overflow-y:auto;padding:22px;min-height:0}
  .loading{color:var(--muted);text-align:center;padding:60px}

  /* CARDS / GRID */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .kpi .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .kpi .val{font-family:var(--mono);font-size:28px;font-weight:600;margin-top:6px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .kpi.accent{background:var(--accent-bg);border-color:#eccfa0}.kpi.accent .val{color:var(--accent-ink)}
  .cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:1000px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .panel h3{font-family:'Bricolage Grotesque';font-size:17px;margin:0 0 14px}
  .panel h3 .small{font-family:'Inter';font-size:12px;color:var(--muted);font-weight:400;margin-left:8px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 8px;font-size:14px;border-bottom:1px solid var(--line)}
  th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  td.num,th.num{text-align:right;font-family:var(--mono)}tr:last-child td{border-bottom:none}
  .thumb{display:inline-block;width:50px;height:38px;border-radius:8px;overflow:hidden;vertical-align:middle;margin-right:10px;border:1px solid var(--line)}
  .thumb .art{width:50px;height:38px;display:block}
  .chip{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .chip.cocina{background:var(--accent-bg);color:var(--accent-ink)}.chip.barra{background:var(--blue-bg);color:var(--blue)}
  .chip.ok{background:var(--green-bg);color:var(--green)}.chip.low{background:var(--red-bg);color:var(--red)}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .bar-row .bn{font-size:13px;width:140px;flex:0 0 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-row .bt{flex:1;height:22px;background:var(--paper);border-radius:6px;overflow:hidden}
  .bar-row .bf{height:100%;background:var(--accent);border-radius:6px}
  .bar-row .bv{font-family:var(--mono);font-size:13px;width:70px;text-align:right;flex:0 0 auto}

  /* POS */
  .pos{display:grid;grid-template-columns:1fr 360px;gap:16px;height:100%}
  @media(max-width:900px){.pos{grid-template-columns:1fr}}
  .pos-menu{overflow-y:auto}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .cat{background:var(--card);border:1px solid var(--line);padding:10px 17px;border-radius:999px;font-weight:600;font-size:15px;color:var(--muted)}
  .cat.active{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:16px}
  .prod{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;text-align:left;display:flex;flex-direction:column;transition:transform .08s,box-shadow .12s;padding:0}
  .prod:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.09)}
  .prod:active{transform:scale(.98)}
  .prod .art{height:134px;width:100%;display:block;object-fit:cover}
  .prod .meta{padding:12px 14px}
  .prod .nm{font-weight:600;font-size:16px;line-height:1.25}
  .prod .row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
  .prod .pr{font-family:var(--mono);font-weight:600;color:var(--accent-ink)}
  .prod .dest{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .ticket{background:var(--card);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .thead{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:600;display:flex;justify-content:space-between;align-items:center}
  .thead .mfolio{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .thead a{color:var(--accent-ink);font-size:12px;cursor:pointer;font-weight:600}
  .svc{display:flex;gap:6px;padding:12px 14px 0}
  .svc button{flex:1;padding:9px;font-weight:600;font-size:13px;background:var(--paper);color:var(--muted);border:1px solid var(--line)}
  .svc button.active{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .cli{padding:10px 14px 0}.cli input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;margin-bottom:6px;font-size:13px}
  .lines{flex:1;overflow-y:auto;padding:12px 14px;min-height:50px}
  .empty{color:var(--muted);text-align:center;padding:30px 8px;font-size:14px;line-height:1.5}
  .line{border-bottom:1px dashed var(--line);padding:10px 0;display:flex;gap:8px}
  .line .lname{font-weight:600;font-size:14px}.line .lmod{font-size:12px;color:var(--muted);margin-top:2px}
  .line .lnote{font-size:12px;color:var(--accent-ink);font-style:italic;margin-top:2px}
  .line .lprice{font-family:var(--mono);font-weight:600;font-size:14px;white-space:nowrap}
  .line .rm{background:none;color:var(--muted);font-size:16px;padding:0 4px;align-self:flex-start}.line .rm:hover{color:var(--red)}
  .totals{padding:12px 14px;border-top:2px solid var(--ink)}
  .trow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
  .trow.tot{font-size:19px;font-weight:700;color:var(--ink);padding-top:8px}
  .extra-btns{display:flex;gap:6px;margin:8px 0}
  .extra-btns button{flex:1;background:var(--paper);border:1px solid var(--line);padding:7px;font-size:12px;font-weight:600;color:var(--muted)}
  .pay{width:100%;padding:13px;background:var(--green);color:#fff;font-weight:700;font-size:16px;margin-top:4px}
  .pay.amber{background:var(--accent);color:#2c1c04}
  .pay:disabled{background:#cfc9bd;color:#fff;cursor:not-allowed}
  .paymesa{display:flex;gap:8px;margin-top:4px}.paymesa .pay{margin-top:0}

  /* KDS */
  .kds{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .ko{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .ko.listo{border-color:var(--green)}
  .ko-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;font-weight:600;border-bottom:1px solid var(--line)}
  .ko-head .folio{font-family:var(--mono)}.ko-head .timer{font-family:var(--mono);font-size:13px}.ko-head .timer.warn{color:var(--red)}
  .ko-srv{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:0 14px;margin-top:6px}
  .ko-body{padding:8px 14px;flex:1}
  .ko-item{font-size:14px;padding:4px 0}.ko-item .m{font-size:12px;color:var(--muted)}.ko-item .n{font-size:12px;color:var(--accent-ink);font-style:italic}
  .ko-foot{padding:10px 14px;border-top:1px solid var(--line)}.ko-foot button{width:100%;padding:9px;font-weight:600;font-size:13px}
  .b-listo{background:var(--accent);color:#2c1c04}.b-entregar{background:var(--green);color:#fff}

  /* MESAS */
  .mesas{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
  .mesa{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;text-align:center;transition:transform .08s,box-shadow .12s;display:flex;flex-direction:column}
  .mesa:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.09)}
  .mesa:active{transform:scale(.98)}
  .mesa .art{width:100%;height:130px;display:block}
  /* touch: blancos de toque cómodos */
  .btn,.pay,.cat,.modal-foot button,.modal-foot a,.paytabs button,.svc button,.cuenta-btn{min-height:46px;display:inline-flex;align-items:center;justify-content:center}
  .mesa .mbody{padding:10px 12px 12px}
  .mesa .ms{font-size:12px;font-weight:600;margin-top:2px}
  .mesa.libre .ms{color:var(--green)}.mesa.ocupada .ms{color:var(--accent-ink)}.mesa.cuenta .ms{color:var(--blue)}
  .mesa .mtot{font-family:var(--mono);font-weight:600;font-size:15px;margin-top:3px}
  .mesa .cuenta-btn{margin-top:8px;width:100%;background:var(--blue-bg);color:var(--blue);font-weight:600;font-size:12px;padding:6px;border:1px solid var(--blue-bg)}

  /* MODAL */
  .ov{position:fixed;inset:0;background:rgba(20,18,12,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
  .ov.show{display:flex}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;padding:20px}
  .modal h3{font-family:'Bricolage Grotesque';margin:0 0 2px;font-size:20px}.modal .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .grp{margin-bottom:14px}.grp .glabel{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;justify-content:space-between}
  .grp .req{font-size:11px;color:var(--red);font-weight:600;text-transform:uppercase}
  .opt{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer}
  .opt:hover{border-color:var(--accent)}.opt input{accent-color:var(--accent);width:17px;height:17px}
  .opt .onm{flex:1;font-size:14px}.opt .od{font-family:var(--mono);font-size:13px;color:var(--accent-ink)}
  .field{margin-bottom:12px}.field label{display:block;font-weight:600;font-size:13px;margin-bottom:5px}
  .field input,.field select{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:15px}
  .field input.mono{font-family:var(--mono);font-size:18px}
  .nota{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px}
  .modal-foot{display:flex;gap:8px;margin-top:14px}.modal-foot button{flex:1;padding:12px;font-weight:700;font-size:15px}
  .btn-ghost{background:var(--paper);color:var(--ink)}.btn-primary{background:var(--ink);color:#e8e3d8}.btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .paytabs{display:flex;gap:6px;margin-bottom:12px}.paytabs button{flex:1;padding:9px;font-size:13px;font-weight:600;background:var(--paper);border:1px solid var(--line);color:var(--muted)}
  .paytabs button.active{background:var(--ink);color:#e8e3d8;border-color:var(--ink)}
  .bignum{font-family:var(--mono);font-size:30px;font-weight:700;text-align:center;padding:6px 0}
  .cambio{text-align:center;font-weight:600;font-family:var(--mono);font-size:16px;min-height:22px}
  .breakdown{background:var(--paper);border-radius:10px;padding:12px 14px;margin-bottom:12px;font-family:var(--mono);font-size:14px}
  .breakdown .b{display:flex;justify-content:space-between;padding:3px 0}.breakdown .b.hl{border-top:1px dashed var(--line);margin-top:4px;padding-top:6px;font-weight:600}
  .result{text-align:center;padding:14px;border-radius:10px;font-weight:700;font-size:18px;margin-top:6px}
  .result.faltante{background:var(--red-bg);color:var(--red)}.result.sobrante{background:#fdf3df;color:var(--accent-ink)}.result.cuadrado{background:var(--green-bg);color:var(--green)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#e8e3d8;padding:12px 20px;border-radius:10px;font-weight:600;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"><div class="loading">Cargando…</div></div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
// ===========================================================================
//  Cliente de API
// ===========================================================================
const API = {
  get token(){return localStorage.getItem('cp_token');},
  set token(v){v?localStorage.setItem('cp_token',v):localStorage.removeItem('cp_token');},
  async call(method,path,body){
    const r=await fetch(path,{method,headers:{'Content-Type':'application/json',...(this.token?{Authorization:'Bearer '+this.token}:{})},body:body?JSON.stringify(body):undefined});
    if(r.status===401&&this.token){this.token=null;boot();throw new Error('Sesión expirada');}
    const data=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(data.error||('Error '+r.status));
    return data;
  },
  get(p){return this.call('GET',p);},post(p,b){return this.call('POST',p,b);},patch(p,b){return this.call('PATCH',p,b);},del(p){return this.call('DELETE',p);},
};
const money=n=>'$'+(+(n||0)).toFixed(2);
const $=s=>document.querySelector(s);
const ov=$('#ov'),modal=$('#modal');
function closeModal(){ov.classList.remove('show');modal.innerHTML='';}
ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
let tt;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}

// ===========================================================================
//  Ilustraciones (SVG). Si el producto trae .foto (URL), se usa la imagen.

function artBurger(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdf4e2"/><stop offset="1" stop-color="#f6e0bc"/></linearGradient><linearGradient id="btop" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f2b765"/><stop offset="1" stop-color="#dd9038"/></linearGradient><linearGradient id="bbot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6a249"/><stop offset="1" stop-color="#cf8a32"/></linearGradient><linearGradient id="bpat" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#824a26"/><stop offset="1" stop-color="#5e3318"/></linearGradient></defs><rect width="160" height="120" fill="url(#bbg)"/><ellipse cx="80" cy="100" rx="54" ry="7" fill="#7a4a10" opacity=".12"/><path d="M28 50c0-23 24-35 52-35s52 12 52 35z" fill="url(#btop)"/><path d="M44 30c9-8 24-11 40-9" stroke="#ffe6b8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity=".55"/><g fill="#fbe3ac"><ellipse cx="62" cy="34" rx="3" ry="1.7" transform="rotate(-18 62 34)"/><ellipse cx="80" cy="28" rx="3" ry="1.7"/><ellipse cx="98" cy="34" rx="3" ry="1.7" transform="rotate(18 98 34)"/><ellipse cx="71" cy="40" rx="3" ry="1.7" transform="rotate(-10 71 40)"/><ellipse cx="90" cy="40" rx="3" ry="1.7" transform="rotate(10 90 40)"/></g><path d="M26 50h108c-6 8-15 4-21 8-6 4-12 0-18 4-6 4-12 0-18 0-6 0-12 4-18 0-6-4-15 0-15-12z" fill="#7cb949"/><path d="M30 58h100v7l-9 8-7-6-9 8-7-6-9 8-7-6-9 8-7-6-9 8-7-6-7 4z" fill="#f4b740"/><rect x="28" y="66" width="104" height="15" rx="7" fill="url(#bpat)"/><rect x="30" y="80" width="100" height="16" rx="8" fill="url(#bbot)"/></svg>`;}

function artFries(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdf4e2"/><stop offset="1" stop-color="#f6e0bc"/></linearGradient><linearGradient id="frb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e1503c"/><stop offset="1" stop-color="#bf3526"/></linearGradient><linearGradient id="fr" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8d370"/><stop offset="1" stop-color="#e0a23c"/></linearGradient></defs><rect width="160" height="120" fill="url(#fbg)"/><ellipse cx="80" cy="104" rx="34" ry="6" fill="#7a4a10" opacity=".12"/><g fill="url(#fr)"><rect x="58" y="40" width="7" height="50" rx="3"/><rect x="68" y="30" width="7" height="60" rx="3"/><rect x="78" y="36" width="7" height="54" rx="3"/><rect x="88" y="26" width="7" height="64" rx="3"/><rect x="98" y="42" width="7" height="48" rx="3"/></g><path d="M50 64h60l-6 36a6 6 0 0 1-6 5H62a6 6 0 0 1-6-5z" fill="url(#frb)"/><path d="M50 64h60l-1 11H51z" fill="#a82e21"/></svg>`;}
function artAgua(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="abg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdeef4"/><stop offset="1" stop-color="#f6d8e4"/></linearGradient><linearGradient id="aliq" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f48fb0"/><stop offset="1" stop-color="#e85f8c"/></linearGradient></defs><rect width="160" height="120" fill="url(#abg)"/><ellipse cx="80" cy="104" rx="28" ry="6" fill="#7a1030" opacity=".12"/><rect x="92" y="20" width="5" height="40" rx="2.5" fill="#fff" opacity=".8" transform="rotate(10 94 40)"/><path d="M58 34h44l-5 60a6 6 0 0 1-6 5H69a6 6 0 0 1-6-5z" fill="#ffffff" opacity=".55"/><path d="M60 48h40l-4 46a5 5 0 0 1-5 4H69a5 5 0 0 1-5-4z" fill="url(#aliq)"/><rect x="66" y="40" width="11" height="11" rx="3" fill="#fff" opacity=".55"/><rect x="84" y="44" width="9" height="9" rx="2.5" fill="#fff" opacity=".5"/><circle cx="100" cy="34" r="9" fill="#8fce4f"/><circle cx="100" cy="34" r="6" fill="#c7e89a"/></svg>`;}
function artPlato(){return `<svg class="art" viewBox="0 0 160 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="pl" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ece7db"/></radialGradient></defs><rect width="160" height="120" fill="#f1efe8"/><ellipse cx="80" cy="64" rx="40" ry="38" fill="#000" opacity=".06"/><circle cx="80" cy="60" r="38" fill="url(#pl)" stroke="#e0d9c8"/><circle cx="80" cy="60" r="24" fill="none" stroke="#e6dfce" stroke-width="2"/><rect x="40" y="44" width="3" height="32" rx="1.5" fill="#c9c1ad"/><rect x="117" y="44" width="3" height="32" rx="1.5" fill="#c9c1ad"/></svg>`;}
function prodArt(prod,catName){
  if(prod.foto)return `<img class="art" src="${prod.foto}" alt="${prod.nombre}" onerror="this.outerHTML=prodArtFallback('${(catName||'').replace(/'/g,'')}','${prod.nombre.replace(/'/g,'')}')">`;
  return prodArtFallback(catName,prod.nombre);
}
function prodArtFallback(catName,nombre){
  const n=(nombre||'').toLowerCase(),c=(catName||'').toLowerCase();
  if(/agua|limonada|jamaica|horchata/.test(n))return artAgua();
  if(/refresco|bebida|soda|coca/.test(n)||c.includes('bebida')&&!/agua/.test(n))return artSoda();
  if(/papa|fries|aro|nugget/.test(n))return artFries();
  if(/hamburg|burger|bbq|doble|combo|sandwich|pollo/.test(n)||c.includes('hamburg'))return artBurger();
  if(c.includes('acompa'))return artFries();
  if(c.includes('bebida'))return artSoda();
  return artPlato();
}
function mesaArt(estado){
  const col={libre:['#e7f3ea','#2f8f4e'],ocupada:['#fbeed8','#e0841a'],cuenta:['#e7eef6','#3b6ea5']}[estado]||['#f1efe8','#8c857a'];
  const [bg,c]=col;
  return `<svg class="art" viewBox="0 0 150 118" xmlns="http://www.w3.org/2000/svg"><rect width="150" height="118" fill="${bg}"/><rect x="40" y="18" width="70" height="14" rx="4" fill="${c}" opacity=".85"/><rect x="40" y="86" width="70" height="14" rx="4" fill="${c}" opacity=".85"/><rect x="22" y="40" width="14" height="38" rx="4" fill="${c}" opacity=".85"/><rect x="114" y="40" width="14" height="38" rx="4" fill="${c}" opacity=".85"/><rect x="44" y="38" width="62" height="42" rx="10" fill="#fff" stroke="${c}" stroke-width="2"/><circle cx="75" cy="59" r="13" fill="${bg}"/></svg>`;}

async function boot(){
  if(kdsTimer){clearInterval(kdsTimer);kdsTimer=null;}
  if(!API.token){renderLogin();return;}
  try{
    app.sucursales=await API.get('/api/sucursales');
    if(!app.sucursalId)app.sucursalId=app.sucursales[0].id;
    await refreshTurno();
    app.menu=await API.get('/api/menu');
    renderShell();go('resumen');
  }catch(e){API.token=null;renderLogin();}
}
function renderLogin(){
  $('#app').innerHTML=`<div class="login"><form class="login-card" id="lf">
    <div class="logo">Jefe<b>Burgers</b></div><div class="tg">Consola de operación</div>
    <label>Usuario</label><input id="lu" autocomplete="username" autofocus>
    <label>Contraseña</label><input id="lp" type="password" autocomplete="current-password">
    <button type="submit">Entrar</button><div class="err" id="le"></div></form></div>`;
  $('#lf').onsubmit=async ev=>{ev.preventDefault();$('#le').textContent='';
    try{const r=await API.post('/api/auth/login',{username:$('#lu').value.trim(),password:$('#lp').value});API.token=r.token;app.tenant=r.tenant;boot();}
    catch(e){$('#le').textContent=e.message;}};
}

async function vResumen(){
  const [res,inv,peds]=await Promise.all([API.get('/api/reportes/resumen?sucursalId='+app.sucursalId),API.get('/api/inventario'),API.get('/api/pedidos?estado=cobrado&sucursalId='+app.sucursalId)]);
  const fcAvg=inv.foodCost.length?inv.foodCost.reduce((s,f)=>s+f.foodCostPct,0)/inv.foodCost.length:0;
  const low=inv.insumos.filter(i=>i.bajo).length;
  const porHora={};peds.forEach(p=>{const ts=p.pago&&p.pago.timestamp?p.pago.timestamp:p.creado;const h=new Date(ts).getHours();porHora[h]=(porHora[h]||0)+p.total;});
  const horas=[];for(let h=11;h<=21;h++)horas.push([h,porHora[h]||0]);const maxH=Math.max(1,...horas.map(x=>x[1]));
  const top=Object.entries(res.porProducto||{}).sort((a,b)=>b[1].q-a[1].q).slice(0,5);const maxT=Math.max(1,...top.map(x=>x[1].q));
  $('#view').innerHTML=`
  <div class="kpis">
    <div class="kpi accent"><div class="lab">Venta del día</div><div class="val">${money(res.venta)}</div><div class="sub">${res.pedidos} pedidos cobrados</div></div>
    <div class="kpi"><div class="lab">Ticket promedio</div><div class="val">${money(res.ticketPromedio)}</div><div class="sub">por pedido</div></div>
    <div class="kpi"><div class="lab">Food cost prom.</div><div class="val">${fcAvg.toFixed(1)}%</div><div class="sub">sano: 28–35%</div></div>
    <div class="kpi"><div class="lab">Insumos bajos</div><div class="val">${low}</div><div class="sub">a reabastecer</div></div></div>
  <div class="cols">
    <div class="panel"><h3>Ventas por hora <span class="small">hoy</span></h3>
      <svg viewBox="0 0 440 160" width="100%">${horas.map((x,i)=>{const bh=x[1]/maxH*120,bx=10+i*40;return `<rect x="${bx}" y="${140-bh}" width="26" height="${bh}" rx="4" fill="var(--accent)"/><text x="${bx+13}" y="154" font-size="10" text-anchor="middle" fill="var(--muted)" font-family="monospace">${x[0]}</text>`;}).join('')}</svg></div>
    <div class="panel"><h3>Top productos <span class="small">por piezas</span></h3>
      ${top.length?top.map(([n,d])=>`<div class="bar-row"><div class="bn">${n}</div><div class="bt"><div class="bf" style="width:${d.q/maxT*100}%"></div></div><div class="bv">${d.q}</div></div>`).join(''):'<div class="empty">Sin ventas aún</div>'}</div></div>
  <div class="cols" style="margin-top:16px">
    <div class="panel"><h3>Estado de caja</h3>${app.turno?`<table>
      <tr><td>Fondo inicial</td><td class="num">${money(app.turno.fondoInicial)}</td></tr>
      <tr><td>Ventas efectivo</td><td class="num">${money(res.porPago.efectivo)}</td></tr>
      <tr><td>Ventas tarjeta</td><td class="num">${money(res.porPago.tarjeta)}</td></tr>
      <tr><td>Ventas transferencia</td><td class="num">${money(res.porPago.transferencia)}</td></tr>
      <tr><td><b>Esperado en cajón</b></td><td class="num"><b>${money(app.turno.fondoInicial+res.porPago.efectivo)}</b></td></tr></table>`:'<div class="empty">Turno cerrado.</div>'}</div>
    <div class="panel"><h3>Mezcla de pago</h3>${['efectivo','tarjeta','transferencia'].map(k=>{const t=res.porPago.efectivo+res.porPago.tarjeta+res.porPago.transferencia||1;return `<div class="bar-row"><div class="bn" style="text-transform:capitalize">${k}</div><div class="bt"><div class="bf" style="width:${res.porPago[k]/t*100}%;background:${k==='efectivo'?'var(--green)':k==='tarjeta'?'var(--blue)':'var(--accent)'}"></div></div><div class="bv">${money(res.porPago[k])}</div></div>`;}).join('')}</div></div>`;
}

  if($('#cliEnvio'))$('#cliEnvio').addEventListener('change',saveCliente);

  if($('#btnCobrar'))$('#btnCobrar').onclick=cobrar;

  renderLines();

function mesaNombre(id){return 'Mesa '+(app._mesaNum&&app._mesaNum[id]||'');}
function onSvc(s){

  if(app.pos.pedido&&app.pos.pedido.lineas.length){toast('Cobra o vacía el pedido actual antes de cambiar');return;}

async function asegurarPedido(){
  if(app.pos.pedido)return app.pos.pedido;
  const body={sucursalId:app.sucursalId,tipoServicio:app.pos.tipoServicio};
  if(app.pos.tipoServicio==='mesa')body.mesaId=app.pos.mesaId;
  const p=await API.post('/api/pedidos',body);app.pos.folio=p.folio;app.pos.pedido=p;return p;
}
async function onProducto(prod){
  if(!app.turno){toast('Abre el turno antes de vender');return;}

    app.pos.pedido=await API.post(`/api/pedidos/${app.pos.folio}/lineas`,{productoId:prod.id,cantidad:1});
    renderLines();
  }catch(e){toast(e.message);}
}

  if(!app.pos.pedido||!app.pos.pedido.lineas.length){toast('Agrega productos primero');return;}

function cobrar(){
  const ped=app.pos.pedido;if(!ped||!ped.lineas.length){toast('Agrega productos');return;}
  let metodo='efectivo';
  const render=()=>{
    modal.innerHTML=`<h3>Cobrar ${money(ped.total)}</h3><div class="sub">${ped.folio}</div>
      <div class="paytabs">${['efectivo','tarjeta','transferencia'].map(m=>`<button data-m="${m}" class="${m===metodo?'active':''}">${m[0].toUpperCase()+m.slice(1)}</button>`).join('')}</div>
      ${metodo==='efectivo'?`<div class="field"><label>Efectivo recibido</label><input id="recib" type="number" class="mono" placeholder="${ped.total}"></div><div class="cambio" id="cambio"></div>`:`<div class="bignum">${money(ped.total)}</div>`}
      <div class="modal-foot"><button class="btn-ghost" id="pCancel">Cancelar</button><button class="btn-primary" id="pOk">Confirmar cobro</button></div>`;
    modal.querySelectorAll('.paytabs button').forEach(b=>b.onclick=()=>{metodo=b.dataset.m;render();});
    if(metodo==='efectivo'){const ri=$('#recib');ri.addEventListener('input',()=>{const r=+ri.value||0,c=r-ped.total;$('#cambio').textContent=r>0?(c>=0?'Cambio: '+money(c):'Faltan '+money(-c)):'';$('#cambio').style.color=c<0?'var(--red)':'var(--green)';});setTimeout(()=>ri.focus(),50);}
    $('#pCancel').onclick=closeModal;
    $('#pOk').onclick=async()=>{let recibido=0,pagos;
      if(metodo==='efectivo'){recibido=+($('#recib').value)||ped.total;if(recibido<ped.total){toast('El efectivo no alcanza');return;}pagos=[{metodo:'efectivo',monto:ped.total}];}
      else pagos=[{metodo,monto:ped.total}];
      try{const p=await API.post(`/api/pedidos/${ped.folio}/cobrar`,{pagos,recibido});closeModal();ticketFinal(p);
        const wasMesa=app.pos.tipoServicio==='mesa';app.pos={folio:null,pedido:null,tipoServicio:wasMesa?'mostrador':app.pos.tipoServicio,mesaId:null,cat:app.pos.cat};renderNav();
      }catch(e){toast(e.message);}};
  };
  render();ov.classList.add('show');
}
function ticketFinal(p){
  modal.innerHTML=`<h3>${p.folio}</h3><div class="sub">${p.tipoServicio} · cobrado</div>
    <div class="breakdown">${p.lineas.map(l=>`<div class="b"><span>${l.cantidad}× ${l.nombre}</span><span>${money(l.importe)}</span></div>`).join('')}${p.costoEnvio?`<div class="b"><span>Envío</span><span>${money(p.costoEnvio)}</span></div>`:''}<div class="b hl"><span>Total</span><span>${money(p.total)}</span></div><div class="b"><span>Pago (${p.pago.metodo})</span><span>${money(p.pago.recibido||p.total)}</span></div>${p.pago.cambio?`<div class="b"><span>Cambio</span><span>${money(p.pago.cambio)}</span></div>`:''}</div>
    <div class="modal-foot"><button class="btn-primary" id="okDone">Listo</button></div>`;
  ov.classList.add('show');$('#okDone').onclick=()=>{closeModal();if(app.vista==='pos')vPOS();else if(app.vista==='mesas')vMesas();};
}

function modalAbrirTurno(){
  modal.innerHTML=`<h3>Abrir turno</h3><div class="sub">Declara el fondo de cambio</div>
    <div class="field"><label>Fondo inicial</label><input id="fondo" type="number" class="mono" value="500"></div>
    <div class="modal-foot"><button class="btn-ghost" id="tCancel">Cancelar</button><button class="btn-primary" id="tOk">Abrir</button></div>`;
  ov.classList.add('show');$('#tCancel').onclick=closeModal;
  $('#tOk').onclick=async()=>{try{app.turno=await API.post('/api/caja/abrir',{sucursalId:app.sucursalId,fondoInicial:+($('#fondo').value)||0});closeModal();renderTopbar();toast('Turno abierto');go(app.vista);}catch(e){toast(e.message);}};
}
function modalCerrarTurno(){
  const t=app.turno;
  modal.innerHTML=`<h3>Cerrar turno</h3><div class="sub">Cuenta el efectivo del cajón</div>
    <div class="field"><label>Efectivo contado</label><input id="conteo" type="number" class="mono" placeholder="0.00"></div><div id="difBox"></div>
    <div class="modal-foot"><button class="btn-ghost" id="cCancel">Cancelar</button><button class="btn-primary" id="cOk">Cerrar turno</button></div>`;
  ov.classList.add('show');$('#cCancel').onclick=closeModal;
  $('#cOk').onclick=async()=>{if($('#conteo').value===''){toast('Captura el efectivo');return;}
    try{const r=await API.post('/api/caja/cerrar',{turnoId:t.id,conteoEfectivo:+$('#conteo').value});const res=r.resultado;
      modal.innerHTML=`<h3>Turno cerrado</h3><div class="breakdown"><div class="b"><span>Venta total</span><span>${money(r.esperado.ventaTotal)}</span></div><div class="b"><span>Esperado efectivo</span><span>${money(r.esperado.efectivo)}</span></div><div class="b"><span>Contado</span><span>${money(r.conteo)}</span></div></div><div class="result ${res}">${res==='cuadrado'?'Caja cuadrada':res==='faltante'?'FALTANTE':'SOBRANTE'} ${money(Math.abs(r.diferencia))}</div><div class="modal-foot"><button class="btn-primary" id="cDone">Entendido</button></div>`;
      app.turno=null;renderTopbar();$('#cDone').onclick=()=>{closeModal();go(app.vista);};
    }catch(e){toast(e.message);}};
}

boot();
</script>
</body>
</html>
